  <style>
    @font-face {
      font-family: 'Roca One';
      src: url('assets/fonts/RocaOne-Black.woff2') format('woff2');
      font-weight: 900;
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #C5943A;
      --gold-glow: rgba(197, 148, 58, 0.15);
      --cream: #F5F0E8;
      --orange: #E8833A;
      --purple: #9B7FCB;
      --dark: #0D0D0D;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.08);
      --btn-bg: rgba(255, 255, 255, 0.06);
      --btn-border: rgba(255, 255, 255, 0.22);
      --btn-hover: rgba(255, 255, 255, 0.10);
    }

    html {
      background: var(--dark);
      color: var(--cream);
      font-family: 'Montserrat', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
      overflow-x: hidden;
    }

    /* ---- Atmospheric Background ---- */

    .atmosphere {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
    }

    .glow--purple {
      width: 55%;
      height: 50%;
      top: -8%;
      left: -15%;
      background: radial-gradient(
        ellipse at 35% 40%,
        rgba(155, 127, 203, 0.22) 0%,
        rgba(155, 127, 203, 0.08) 45%,
        transparent 70%
      );
    }

    .glow--orange {
      width: 50%;
      height: 55%;
      bottom: -10%;
      right: -12%;
      background: radial-gradient(
        ellipse at 60% 55%,
        rgba(232, 131, 58, 0.18) 0%,
        rgba(232, 131, 58, 0.06) 45%,
        transparent 70%
      );
    }

    .glow--gold {
      width: 40%;
      height: 40%;
      top: 35%;
      right: -8%;
      background: radial-gradient(
        ellipse at 45% 50%,
        rgba(197, 148, 58, 0.12) 0%,
        transparent 65%
      );
    }

    /* Grain texture overlay */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      mix-blend-mode: overlay;
    }

    /* ---- Layout ---- */

    .container {
      position: relative;
      z-index: 2;
      max-width: 460px;
      margin: 0 auto;
      padding: 52px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---- Skip Link (Accessibility) ---- */

    .skip-link {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--gold);
      color: var(--dark);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      z-index: 100;
      transition: top 0.2s ease;
    }

    .skip-link:focus {
      top: 12px;
    }

    /* ---- Profile Section ---- */

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid rgba(197, 148, 58, 0.35);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.4),
        0 0 0 4px rgba(197, 148, 58, 0.08);
      object-fit: cover;
    }

    .brand-name {
      font-family: 'Roca One', 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 26px;
      color: #fff;
      margin-top: 16px;
      letter-spacing: 0.5px;
      text-align: center;
    }

    .tagline {
      font-size: 13px;
      font-weight: 400;
      color: var(--cream);
      opacity: 0.75;
      margin-top: 6px;
      text-align: center;
    }

    .trust-line {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 1.8px;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .trust-line svg {
      width: 13px;
      height: 13px;
      fill: var(--gold);
      flex-shrink: 0;
    }

    /* ---- Featured Hero Card ---- */
    /* SEASONAL: Update the featured section content for seasonal promotions */

    .featured {
      width: 100%;
      margin-top: 28px;
      border-radius: 16px;
      overflow: hidden;
      background: var(--card-bg);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(197, 148, 58, 0.20);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .featured:hover {
      transform: translateY(-2px);
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .featured:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    .featured__image {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      opacity: 0.85;
    }

    .featured__body {
      padding: 20px 22px;
    }

    .featured__label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .featured__title {
      font-family: 'Roca One', 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 20px;
      color: #fff;
      line-height: 1.2;
    }

    .featured__cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--orange);
      letter-spacing: 0.5px;
    }

    .featured__cta svg {
      width: 14px;
      height: 14px;
      fill: var(--orange);
      transition: transform 0.2s ease;
    }

    .featured:hover .featured__cta svg {
      transform: translateX(3px);
    }

    /* ---- Link Buttons ---- */

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 15px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      transition: all 0.2s ease;
      position: relative;
    }

    .sparkle {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .link-btn--primary .sparkle {
      opacity: 0.7;
    }

    .link-btn:hover .sparkle {
      opacity: 0.9;
    }

    .link-btn:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    /* Primary CTA */
    .link-btn--primary {
      justify-content: center;
      background: linear-gradient(135deg, #9B6FCB, #C97AB5, #E8833A);
      background-size: 200% 200%;
      animation: gradient-shift 6s ease infinite;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 17px 20px;
      box-shadow: 0 4px 20px rgba(155, 111, 203, 0.3);
      letter-spacing: 0.3px;
    }

    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .link-btn--primary:hover {
      box-shadow: 0 6px 28px rgba(155, 111, 203, 0.4);
      transform: scale(1.02);
    }

    /* Shimmer animation on primary CTA */
    .link-btn--primary::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: linear-gradient(
        105deg,
        transparent 40%,
        rgba(255, 255, 255, 0.12) 45%,
        rgba(255, 255, 255, 0.18) 50%,
        rgba(255, 255, 255, 0.12) 55%,
        transparent 60%
      );
      background-size: 250% 100%;
      animation: shimmer 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 200% 0; }
      50% { background-position: -50% 0; }
    }

    /* Secondary links */
    .link-btn--secondary {
      background: var(--btn-bg);
      color: var(--cream);
      border: 1px solid var(--btn-border);
    }

    .link-btn--secondary:hover {
      background: var(--btn-hover);
      transform: scale(1.02);
      border-color: rgba(255, 255, 255, 0.32);
    }

    /* Reviews link (slightly different treatment) */
    .link-btn--reviews {
      justify-content: center;
      gap: 8px;
      background: transparent;
      color: var(--cream);
      opacity: 0.8;
      border: 1px solid rgba(255, 255, 255, 0.22);
      font-size: 14px;
    }

    .link-btn--reviews:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.32);
    }

    .link-btn--reviews svg {
      width: 15px;
      height: 15px;
      fill: var(--gold);
      margin-right: 8px;
      flex-shrink: 0;
    }

    /* ---- Accent Divider ---- */

    .divider {
      width: 140px;
      height: 2px;
      border-radius: 1px;
      background: linear-gradient(90deg, var(--purple), var(--orange));
      margin: 24px auto;
      opacity: 0.6;
    }

    /* ---- Social Icons ---- */

    .socials {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 8px;
    }

    .social-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      transition: all 0.2s ease;
      color: var(--cream);
      opacity: 0.5;
    }

    .social-icon:hover {
      opacity: 1;
      color: var(--gold);
      background: rgba(197, 148, 58, 0.08);
    }

    .social-icon:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
      opacity: 1;
    }

    .social-icon svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* ---- Footer ---- */

    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 32px;
      gap: 6px;
    }

    .footer__logo {
      width: 48px;
      height: 48px;
      opacity: 1;
    }

    .footer__text {
      font-size: 11px;
      color: var(--cream);
      opacity: 0.3;
      letter-spacing: 1px;
    }

    /* ---- Responsive ---- */

    @media (min-width: 768px) {
      .container {
        padding-top: 72px;
        padding-bottom: 56px;
      }

      .brand-name {
        font-size: 30px;
      }

      .featured__image {
        height: 180px;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
