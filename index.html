  <style>
    @font-face {
      font-family: 'Roca One';
      src: url('assets/fonts/RocaOne-Black.woff2') format('woff2');
      font-weight: 900;
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Website design system tokens */
      --color-bg: #080706;
      --color-surface: #0E0D0B;
      --color-surface-hover: #1A1816;
      --color-text-primary: #F5F0E8;
      --color-text-secondary: #A8A09A;
      --color-text-tertiary: #706B65;
      --color-text-inverse: #0C0A09;
      --color-gold: #C8A55C;
      --color-gold-light: #D4B76E;
      --color-gold-dim: #9E834A;
      --color-gold-subtle: rgba(200, 165, 92, 0.08);
      --color-gold-glow: rgba(200, 165, 92, 0.15);
      --color-border: rgba(245, 240, 232, 0.08);
      --color-border-hover: rgba(245, 240, 232, 0.15);
      --gradient-accent: linear-gradient(135deg, #B06AB3, #E87461, #F5A623);

      /* Radii */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;

      /* Shadows — gold-tinted */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 3px rgba(200, 165, 92, 0.03);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4), 0 2px 6px rgba(200, 165, 92, 0.04);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5), 0 4px 16px rgba(200, 165, 92, 0.06);

      /* Motion */
      --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1);
      --duration-fast: 150ms;
      --duration-normal: 300ms;
    }

    html {
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
      overflow-x: hidden;
      line-height: 1.65;
    }

    /* ---- Atmospheric Background — subtle warm glow ---- */

    .atmosphere {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
    }

    .glow--warm {
      width: 60%;
      height: 50%;
      top: -15%;
      left: 20%;
      background: radial-gradient(
        ellipse at 50% 40%,
        rgba(200, 165, 92, 0.10) 0%,
        rgba(200, 165, 92, 0.04) 40%,
        transparent 70%
      );
    }

    /* Grain texture overlay */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      mix-blend-mode: overlay;
    }

    /* ---- Layout ---- */

    .container {
      position: relative;
      z-index: 2;
      max-width: 460px;
      margin: 0 auto;
      padding: 52px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---- Skip Link (Accessibility) ---- */

    .skip-link {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-gold);
      color: var(--color-text-inverse);
      padding: 8px 16px;
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      z-index: 100;
      transition: top var(--duration-fast) var(--ease-out);
    }

    .skip-link:focus {
      top: 0;
    }

    /* ---- Profile Section ---- */

    .logo-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-glow {
      position: absolute;
      width: 200px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(
        ellipse at center,
        rgba(176, 106, 179, 0.30) 0%,
        rgba(232, 116, 97, 0.15) 40%,
        transparent 70%
      );
      filter: blur(16px);
      pointer-events: none;
    }

    .logo-img {
      position: relative;
      z-index: 1;
      height: 52px;
      width: auto;
    }

    .tagline {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: 19px;
      font-weight: 400;
      color: var(--color-text-secondary);
      margin-top: 16px;
      text-align: center;
      letter-spacing: -0.01em;
    }

    .trust-line {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--color-gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .trust-line svg {
      width: 13px;
      height: 13px;
      fill: var(--color-gold);
      flex-shrink: 0;
    }

    /* ---- Featured Hero Card ---- */

    .featured {
      width: 100%;
      margin-top: 28px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-md);
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color var(--duration-normal) var(--ease-out),
                  transform var(--duration-normal) var(--ease-out),
                  box-shadow var(--duration-normal) var(--ease-out);
    }

    .featured:hover {
      border-color: var(--color-border-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .featured:focus-visible {
      outline: 2px solid var(--color-gold);
      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }

    .featured__image {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }

    .featured__body {
      padding: 20px 22px;
    }

    .featured__label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-gold);
      margin-bottom: 6px;
    }

    .featured__title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-weight: 400;
      font-size: 22px;
      color: #fff;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .featured__title em {
      font-style: italic;
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .featured__cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 500;
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.02em;
    }

    .featured__cta svg {
      width: 14px;
      height: 14px;
      fill: #E87461;
      transition: transform var(--duration-normal) var(--ease-out);
    }

    .featured:hover .featured__cta svg {
      transform: translateX(3px);
    }

    /* ---- Link Buttons ---- */

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 15px 24px;
      border-radius: var(--radius-md);
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.02em;
      transition: transform var(--duration-fast) var(--ease-out),
                  background var(--duration-normal) var(--ease-out),
                  border-color var(--duration-normal) var(--ease-out),
                  box-shadow var(--duration-normal) var(--ease-out);
    }

    .link-btn:focus-visible {
      outline: 2px solid var(--color-gold);
      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }

    /* Primary CTA — website gradient */
    .link-btn--primary {
      position: relative;
      z-index: 1;
      background: var(--gradient-accent);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 17px 24px;
      min-height: 52px;
      border: none;
    }

    /* Glow behind on hover — matches website btn-gradient */
    .link-btn--primary::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: var(--gradient-accent);
      opacity: 0;
      z-index: -1;
      filter: blur(16px);
      transition: opacity var(--duration-normal) var(--ease-out);
    }

    .link-btn--primary:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .link-btn--primary:hover::after {
      opacity: 0.5;
    }

    .link-btn--primary:active {
      transform: translateY(0);
    }

    /* Secondary links — website ghost style */
    .link-btn--secondary {
      background: transparent;
      color: var(--color-text-primary);
      border: 1px solid var(--color-border-hover);
      font-weight: 500;
    }

    .link-btn--secondary:hover {
      border-color: var(--color-gold-dim);
      background: var(--color-gold-subtle);
      transform: translateY(-1px);
    }

    .link-btn--secondary:active {
      transform: scale(0.98);
    }

    /* Reviews link */
    .link-btn--reviews {
      gap: 8px;
      background: transparent;
      color: var(--color-text-primary);
      border: 1px solid var(--color-border-hover);
      font-size: 15px;
      font-weight: 500;
    }

    .link-btn--reviews:hover {
      border-color: var(--color-gold-dim);
      background: var(--color-gold-subtle);
    }

    .link-btn--reviews svg {
      width: 15px;
      height: 15px;
      fill: var(--color-gold);
      flex-shrink: 0;
    }

    /* ---- Divider ---- */

    .divider {
      width: 100%;
      max-width: 460px;
      height: 1px;
      background: var(--color-border);
      margin: 24px auto;
      border: none;
    }

    /* ---- Social Icons ---- */

    .socials {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 8px;
    }

    .social-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      transition: color var(--duration-normal) var(--ease-out);
      color: var(--color-text-tertiary);
      text-decoration: none;
    }

    .social-icon:hover {
      color: var(--color-gold);
    }

    .social-icon:focus-visible {
      outline: 2px solid var(--color-gold);
      outline-offset: 3px;
      color: var(--color-gold);
    }

    .social-icon svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* ---- Footer ---- */

    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 32px;
      gap: 8px;
    }

    .footer__logo-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer__logo-glow {
      position: absolute;
      width: 320px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(
        ellipse at center,
        rgba(176, 106, 179, 0.35) 0%,
        rgba(232, 116, 97, 0.18) 35%,
        rgba(245, 166, 35, 0.08) 55%,
        transparent 75%
      );
      filter: blur(30px);
      pointer-events: none;
    }

    .footer__logo {
      position: relative;
      z-index: 1;
      height: 24px;
      width: auto;
      opacity: 0.2;
    }

    .footer__text {
      font-size: 11px;
      color: var(--color-text-tertiary);
      letter-spacing: 0.05em;
    }

    /* ---- Responsive ---- */

    @media (min-width: 768px) {
      .container {
        padding-top: 72px;
        padding-bottom: 56px;
      }

      .logo-img {
        height: 58px;
      }

      .featured__image {
        height: 180px;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
